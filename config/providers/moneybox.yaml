# Moneybox savings products configuration
provider: moneybox
base_url: https://www.moneyboxapp.com

# Moneybox uses /save as main savings page
products:
  - name: moneybox_cash_isa
    url: /save
    product_type: cash_isa
    rate_type: variable
    selectors:
      # Moneybox rates are in page text, need regex extraction
      rate: "body"
    rate_pattern: "Cash ISA.*?(\\d+\\.\\d+)%\\s*AER"

  - name: moneybox_open_access_isa
    url: /save
    product_type: easy_access
    rate_type: variable
    selectors:
      rate: "body"
    rate_pattern: "Easy Access.*?(\\d+\\.\\d+)%"

  - name: moneybox_notice_90
    url: /save
    product_type: notice_account
    rate_type: variable
    selectors:
      rate: "body"
    rate_pattern: "90.?Day.*?(\\d+\\.\\d+)%"
    notice_days: 90

  - name: moneybox_notice_95
    url: /save
    product_type: notice_account
    rate_type: variable
    selectors:
      rate: "body"
    rate_pattern: "95.?Day.*?(\\d+\\.\\d+)%"
    notice_days: 95

  - name: moneybox_business_saver
    url: /business
    product_type: business_saver
    rate_type: variable
    selectors:
      rate: "body"
    rate_pattern: "Business.*?(\\d+\\.\\d+)%"

# Rate limiting settings
rate_limit:
  requests_per_second: 0.5
  burst_capacity: 5

# Wait conditions
wait:
  selector: "body"
  timeout_ms: 15000
  wait_for_text: "% AER"
