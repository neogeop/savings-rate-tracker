# Moneybox savings products configuration
provider: moneybox
base_url: https://www.moneyboxapp.com

# Moneybox has individual product pages with clearer rate display
products:
  - name: moneybox_cash_isa
    url: /cash-isa
    product_type: cash_isa
    rate_type: variable
    selectors:
      rate: "body"
    # Match headline "Earn a market-leading X.XX% AER" pattern
    rate_pattern: "market-leading\\s*(\\d+\\.\\d+)%\\s*AER"

  - name: moneybox_open_access_cash_isa
    url: /open-access-cash-isa
    product_type: cash_isa
    rate_type: variable
    selectors:
      rate: "body"
    rate_pattern: "market-leading\\s*(\\d+\\.\\d+)%\\s*AER"

  - name: moneybox_lifetime_isa
    url: /isa/lifetime/cash
    product_type: lifetime_isa
    rate_type: variable
    selectors:
      rate: "body"
    # Match "Earn a market-leading X.XX% AER" headline pattern
    rate_pattern: "Earn a market-leading\\s*(\\d+\\.\\d+)%\\s*AER"

# Rate limiting settings
rate_limit:
  requests_per_second: 0.5
  burst_capacity: 5

# Wait conditions
wait:
  selector: "body"
  timeout_ms: 15000
  wait_for_text: "% AER"
