# Trading 212 savings products configuration
provider: t212
base_url: https://www.trading212.com

# T212 offers better rates via MSE affiliate links
# The MSE promo rate (4.68% currently) is higher than standard rate (4.10%)
# URL params: ?cash-isa=&promo-code=MSE

products:
  - name: t212_cash_isa
    url: /isa?cash-isa=&promo-code=MSE
    product_type: cash_isa
    rate_type: variable
    selectors:
      rate: "body"
    # Extract the headline promo rate "Earn X.XX% AER"
    rate_pattern: "Earn\\s*(\\d+\\.\\d+)%\\*?\\s*AER"

  - name: t212_interest_on_cash
    url: /interest-on-cash
    product_type: easy_access
    rate_type: variable
    selectors:
      rate: "body"
    # Extract GBP rate specifically (page shows EUR, USD, GBP, CHF, etc.)
    rate_pattern: "GBP\\s*(\\d+\\.?\\d*)%"

# Rate limiting settings
rate_limit:
  requests_per_second: 0.5
  burst_capacity: 5

# Wait conditions - T212 uses JS rendering
wait:
  selector: "body"
  timeout_ms: 15000
