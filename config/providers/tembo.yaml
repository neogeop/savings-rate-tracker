# Tembo Money savings products configuration
provider: tembo
base_url: https://www.tembomoney.com

# Each product has its own dedicated page
products:
  - name: tembo_cash_isa_easy_access
    url: /savings/cash-isa
    product_type: cash_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER"

  - name: tembo_cash_isa_fixed_rate
    url: /savings/fixed-term-cash-isa
    product_type: fixed_rate
    rate_type: fixed
    selectors:
      rate: ".chakra-text, .chakra-stack"
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER"
    term_months: 12

  - name: tembo_lifetime_isa_cash
    url: /savings/cash-lifetime-isa
    product_type: lifetime_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER"

  - name: tembo_lifetime_isa_stocks
    url: /savings/stocks-and-shares-lifetime-isa
    product_type: lifetime_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER"

# Rate limiting settings
rate_limit:
  requests_per_second: 0.5
  burst_capacity: 5

# Wait conditions
wait:
  selector: "body"
  timeout_ms: 15000
  wait_for_text: "% AER"
