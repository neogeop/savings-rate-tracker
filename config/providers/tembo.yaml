# Tembo Money savings products configuration
provider: tembo
base_url: https://www.tembomoney.com

# Tembo has a single savings page with all products
# Each product uses specific patterns to extract the correct rate
products:
  - name: tembo_cash_isa_easy_access
    url: /savings
    product_type: cash_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    # Match "X.XX% AER (variable)" pattern - unique to Cash ISA Easy Access
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER\\s*\\(variable\\)"

  - name: tembo_cash_isa_fixed_rate
    url: /savings
    product_type: fixed_rate
    rate_type: fixed
    selectors:
      rate: ".chakra-text, .chakra-stack"
    # Match "X.XX% AER Fixed" pattern - unique to Cash ISA Fixed Rate
    rate_pattern: "(\\d+\\.\\d+)%\\s*AER Fixed"
    term_months: 12

  - name: tembo_lifetime_isa_cash
    url: /savings
    product_type: lifetime_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    # Match "Cash (X.XX% AER variable)" pattern - unique to LISA Cash option
    rate_pattern: "Cash \\((\\d+\\.\\d+)%\\s*AER variable\\)"

  - name: tembo_lifetime_isa_stocks
    url: /savings
    product_type: lifetime_isa
    rate_type: variable
    selectors:
      rate: ".chakra-text, .chakra-stack"
    # Match first rate after "AER Fixed" text - the LISA Stocks rate follows Fixed Rate
    rate_pattern: "AER Fixed.*?(\\d+\\.\\d+)%\\s*AER"

# Rate limiting settings
rate_limit:
  requests_per_second: 0.5
  burst_capacity: 5

# Wait conditions
wait:
  selector: "body"
  timeout_ms: 15000
  wait_for_text: "% AER"
